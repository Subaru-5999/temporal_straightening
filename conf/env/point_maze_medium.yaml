name: point_maze_medium
save_name: medium
args: []
kwargs: {}

dataset:
  _target_: "datasets.point_maze_dset.load_point_maze_slice_train_val"
  n_rollout: null
  normalize_action: ${normalize_action}
  data_path: ${oc.env:DATASET_DIR}/point_maze_medium
  split_ratio: 0.9
  use_preprocessed: false
  use_frame_files: false
  transform:
    _target_: "datasets.img_transforms.default_transform"
    img_size: ${img_size}

decoder_path: null
# DataLoader workers. Tuned for the single B200 MIG pod (matches cpus_per_task=8).
# Override per-run if the pod exposes more/fewer CPUs, e.g. env.num_workers=16.
num_workers: 8
